<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechBot - Soporte SekaiTech</title>
  <style>
    /* ============================================
       RESET Y VARIABLES GLOBALES
       ============================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #10b981;
      --danger: #ef4444;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(0,0,0,0.12);
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ============================================
       CONTENEDOR PRINCIPAL DEL CHAT
       ============================================ */
    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 640px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ============================================
       HEADER DEL CHAT
       ============================================ */
    .chat-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--white);
    }

    .chat-header .avatar {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .chat-header .info h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .chat-header .info p {
      font-size: 12px;
      opacity: 0.8;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--success);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ============================================
       AREA DE MENSAJES
       ============================================ */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--gray-100);
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 4px; }

    /* Mensaje individual */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }

    .message .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.bot .bubble {
      background: var(--white);
      color: var(--gray-800);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message.user .bubble {
      background: var(--primary);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    .message .time {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 4px;
      padding: 0 4px;
    }

    .message.user .time { text-align: right; }

    /* Badge de intencion detectada */
    .intent-badge {
      font-size: 10px;
      background: var(--primary-light);
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 4px;
      display: inline-block;
    }

    /* Indicador de escritura (typing) */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: var(--white);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--gray-400);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    /* ============================================
       SUGERENCIAS DE RESPUESTA RAPIDA
       ============================================ */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 16px;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
    }

    .suggestion-btn {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid var(--gray-200);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .suggestion-btn:hover {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    /* ============================================
       AREA DE INPUT
       ============================================ */
    .chat-input-area {
      padding: 12px 16px;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 42px;
      line-height: 1.4;
      transition: border-color 0.2s;
      color: var(--gray-800);
    }

    .chat-input-area textarea:focus {
      border-color: var(--primary);
    }

    .chat-input-area textarea::placeholder {
      color: var(--gray-400);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:disabled { background: var(--gray-200); cursor: not-allowed; transform: none; }

    .send-btn svg { width: 18px; height: 18px; }

    /* ============================================
       MENSAJE DE ESCALAMIENTO
       ============================================ */
    .escalation-notice {
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #92400e;
      text-align: center;
      margin: 4px 0;
    }

    /* ============================================
       ESTADO VACIO (primer mensaje)
       ============================================ */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--gray-600);
      text-align: center;
      padding: 20px;
    }

    .welcome-screen .icon { font-size: 48px; }
    .welcome-screen h4 { font-size: 16px; color: var(--gray-800); }
    .welcome-screen p { font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="chat-container">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h3>TechBot</h3>
      <p><span class="status-dot"></span> En linea — Soporte SekaiTech</p>
    </div>
  </div>

  <!-- MENSAJES -->
  <div class="chat-messages" id="chatMessages">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="icon">👋</div>
      <h4>Hola! Soy TechBot</h4>
      <p>Puedo ayudarte con precios, stock, soporte tecnico, rastrear pedidos y reparaciones.</p>
    </div>
  </div>

  <!-- SUGERENCIAS -->
  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion('Ver productos disponibles')">Ver productos</button>
    <button class="suggestion-btn" onclick="sendSuggestion('Necesito soporte tecnico')">Soporte tecnico</button>
    <button class="suggestion-btn" onclick="sendSuggestion('Rastrear mi pedido')">Rastrear pedido</button>
    <button class="suggestion-btn" onclick="sendSuggestion('Hablar con un agente')">Hablar con agente</button>
  </div>

  <!-- INPUT -->
  <div class="chat-input-area">
    <textarea
      id="messageInput"
      placeholder="Escribe tu mensaje..."
      rows="1"
      onkeydown="handleKeyDown(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  // ============================================
  // CONFIGURACION
  // ============================================
  const API_URL = 'http://127.0.0.1:8000/api/v1/chat';

  // Genera un token de sesion unico por visita
  const SESSION_TOKEN = 'session-' + Math.random().toString(36).substr(2, 9);

  let isLoading = false;
  let conversationId = null;


  // ============================================
  // ENVIAR MENSAJE
  // ============================================
  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();

    if (!message || isLoading) return;

    // Limpia el input y oculta bienvenida
    input.value = '';
    autoResize(input);
    hideWelcome();

    // Muestra el mensaje del usuario
    appendMessage('user', message);

    // Muestra indicador de escritura
    const typingId = showTyping();
    setLoading(true);

    try {
      // Llama al API del chatbot
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: message,
          session_token: SESSION_TOKEN,
          channel: 'web'
        })
      });

      const data = await response.json();

      // Elimina el indicador de escritura
      removeTyping(typingId);

      // Muestra la respuesta del bot
      appendMessage('bot', data.message, data.intent, data.confidence);

      // Guarda el conversation_id
      if (data.conversation_id) {
        conversationId = data.conversation_id;
      }

      // Si fue escalado muestra aviso
      if (data.escalated) {
        appendEscalationNotice();
      }

      // Actualiza las sugerencias
      if (data.suggestions && data.suggestions.length > 0) {
        updateSuggestions(data.suggestions);
      }

    } catch (error) {
      removeTyping(typingId);
      appendMessage('bot', 'Lo siento, hubo un error de conexion. Intenta de nuevo.');
    }

    setLoading(false);
    scrollToBottom();
  }


  // ============================================
  // ENVIAR SUGERENCIA (click en boton rapido)
  // ============================================
  function sendSuggestion(text) {
    document.getElementById('messageInput').value = text;
    sendMessage();
  }


  // ============================================
  // AGREGAR MENSAJE AL CHAT
  // ============================================
  function appendMessage(type, text, intent, confidence) {
    const container = document.getElementById('chatMessages');

    const div = document.createElement('div');
    div.className = 'message ' + type;

    const now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });

    let intentBadge = '';
    if (type === 'bot' && intent && intent !== 'desconocido') {
      intentBadge = '<span class="intent-badge">' + intent.replace('_', ' ') + '</span>';
    }

    div.innerHTML =
      '<div class="bubble">' + escapeHtml(text) + '</div>' +
      (intentBadge ? intentBadge : '') +
      '<span class="time">' + now + '</span>';

    container.appendChild(div);
    scrollToBottom();
  }


  // ============================================
  // AVISO DE ESCALAMIENTO
  // ============================================
  function appendEscalationNotice() {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'escalation-notice';
    div.innerHTML = '⚡ Ticket creado automaticamente. Un agente te contactara pronto.';
    container.appendChild(div);
    scrollToBottom();
  }


  // ============================================
  // INDICADOR DE ESCRITURA
  // ============================================
  function showTyping() {
    const container = document.getElementById('chatMessages');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.id = id;
    div.className = 'message bot';
    div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    container.appendChild(div);
    scrollToBottom();
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }


  // ============================================
  // ACTUALIZAR SUGERENCIAS
  // ============================================
  function updateSuggestions(suggestions) {
    const container = document.getElementById('suggestions');
    container.innerHTML = suggestions.map(s =>
      '<button class="suggestion-btn" onclick="sendSuggestion(\'' + s.replace(/'/g, "\\'") + '\')">' + escapeHtml(s) + '</button>'
    ).join('');
  }


  // ============================================
  // UTILIDADES
  // ============================================
  function hideWelcome() {
    const welcome = document.getElementById('welcomeScreen');
    if (welcome) welcome.remove();
  }

  function scrollToBottom() {
    const container = document.getElementById('chatMessages');
    container.scrollTop = container.scrollHeight;
  }

  function setLoading(state) {
    isLoading = state;
    document.getElementById('sendBtn').disabled = state;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKeyDown(e) {
    // Enter envia, Shift+Enter agrega nueva linea
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }
</script>

</body>
</html>
